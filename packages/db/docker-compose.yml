name: doctor.com

services:
  postgres:
    image: postgres
    container_name: doctor.com-postgres
    environment:
      POSTGRES_DB: doctor.com
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - doctor.com_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  doctor.com_postgres_data:
