name: Discord Notifications

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ACTOR="${{ github.actor }}"
            BRANCH="${{ github.ref_name }}"
            REPO="${{ github.repository }}"

            COMMITS=$(jq -r '.commits[] | "• \(.author.name): \(.message)"' "$GITHUB_EVENT_PATH")

            if [ -z "$COMMITS" ]; then
              COMMITS="• No commit message found"
            fi

            CONTENT="📌 **$ACTOR** pushed to **$BRANCH** in **$REPO**%0A$COMMITS"

            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"$CONTENT\"}" \
              "$DISCORD_WEBHOOK"

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            ACTOR="${{ github.actor }}"
            REPO="${{ github.repository }}"
            ACTION="${{ github.event.action }}"
            TITLE="${{ github.event.pull_request.title }}"

            CONTENT="🔁 **$ACTOR** $ACTION a pull request in **$REPO**%0A• $TITLE"

            curl -H "Content-Type: application/json" \
              -d "{\"content\":\"$CONTENT\"}" \
              "$DISCORD_WEBHOOK"
          fi